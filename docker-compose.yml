# version: "3.9" -- obsoleto, ignorado por Docker Compose moderno

services:
  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:16-alpine
    container_name: magnus_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-magnus}
      POSTGRES_USER: ${POSTGRES_USER:-magnus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-magnus_change_me}
    volumes:
      - magnus_pgdata:/var/lib/postgresql/data
    command: >
      postgres -c shared_buffers=256MB -c effective_cache_size=768MB -c work_mem=4MB -c maintenance_work_mem=64MB -c max_connections=50 -c wal_level=minimal -c max_wal_senders=0 -c synchronous_commit=off -c checkpoint_completion_target=0.9 -c log_min_duration_statement=1000
    networks:
      - magnus_net
    # Puerto 5432 NO expuesto al host intencionalmente (fix seguridad).
    # El servicio 'magnus' accede por red interna magnus_net.
    # Acceso manual: docker exec -it magnus_postgres psql -U magnus magnus
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magnus} -d ${POSTGRES_DB:-magnus}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ========================================
  # Magnus-OS2 (All-in-One: Node 20)
  # ========================================
  magnus:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: magnus_os2_app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://magnus:magnus_change_me@postgres:5432/magnus}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - magnus_net
    ports:
      - "4000:4000"
    volumes:
      - ./server/data:/app/server/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

# ========================================
# Networks
# ========================================
networks:
  magnus_net:
    driver: bridge

# ========================================
# Volumes
# ========================================
volumes:
  magnus_pgdata:
    driver: local
